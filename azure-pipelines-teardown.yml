# azure-pipelines-teardown.yml
# Stops the app on the VM. Manually triggered only — never runs on its own.

trigger: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: SSH@0
    displayName: 'SSH into VM and stop the stack'
    inputs:
      sshEndpoint: 'Azure VM SSH'   # same service connection as the deploy pipeline
      runOptions: 'commands'
      commands: |
        cd ~/finvestigate
        docker compose down
        docker compose ps
