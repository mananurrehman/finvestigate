name: 0 - CI Pipeline

on:
  push: 
    branches:
      - dev
  pull_request:
    branches:
        - main
  workflow_dispatch:

jobs:

    code-quality:
        name: Code Quality (flake8)
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.14'

            - name: Cache pip
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
            
            - name: Install flake8
              run: pip install flake8

            - name: Run flake8
              run: |
                echo "Running flake8 on Finvestigate"
                flake8 app/ run.py --max-line-length=120 --exclude=__init__.py,venv/,.venv/,migrations/,__pycache__/ 
                # use || true to prevent the job from failing if flake8 finds issues,
                echo "flake8 check completed"

    security-scan:
        name: Security Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.14'
            
            - name: Cache pip
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

            - name: Install bandit
              run: pip install bandit

            - name: Run bandit
              run: | 
                echo "Running bandit security scan on Finvestigate"
                bandit -r app/ run.py --exclude __init__.py,venv/,.venv/,migrations/,__pycache__
                echo "Bandit security scan completed"
    
    secret-scan:
        name: Secret Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            - name: Run gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    dependency-audit: 
      name: Dependency Audit
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.14'
        
        - name: Cache pip
          uses: actions/cache@v4
          with:
            path: ~/.cache/pip
            key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

        - name: Install pip-audit
          run: pip install pip-audit

        - name: Run pip-audit
          run: | 
            echo "Running pip-audit for CVE check on Finvestigate"
            pip-audit -r requirements.txt
            echo "pip-audit check completed"

    tests: 
      name: Run Tests
      runs-on: ubuntu-latest
      needs: [code-quality, security-scan, secret-scan, dependency-audit]
      
      services:
        postgres:
          image: postgres:15
          env:
            POSTGRES_USER: test
            POSTGRES_PASSWORD: test
            POSTGRES_DB: test_db
          ports:
            - 5432:5432
          options: >-
            --health-cmd ps_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.14'

        - name: Cache pip
          uses: actions/cache@v4
          with:
            path: ~/.cache/pip
            key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

        - name: Install dependencies
          run: pip install -r requirements.txt

        - name: Run tests
          env:
             FLASK_APP: run.py
             SECRET_KEY: test_secret_key
             DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          run: |
            echo "Running tests with pytest"
            pytest tests/ -v
            echo "All Tests completed"