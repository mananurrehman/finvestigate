name: deploy-to-ec2

on: 
  workflow_run:
    workflows: ["docker-security"]
    types:
      - completed
    branches:
      - main
      
jobs: 

    deploy: 
        name: Deploy Finvestigate to EC2
        runs-on: ubuntu-latest
        if: github.event.workflow_run.head_branch == 'main'
        steps: 
            - name: Deploy to EC2 vis SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                envs: DOCKERHUB_USERNAME, SECRET_KEY, DATABASE_URL, SECRET_KEY 
                script: |
                    set -e
                    echo "Starting Finvestigate deployment..."

                    APP_DIR="/home/ubuntu/finvestigate"
                    DATA_DIR="/home/ubuntu/finvestigate-data"

                    echo "=== [1/6] Ensuring directories exist ==="
                    mkdir -p "$APP_DIR"
                    mkdir -p "$DATA_DIR/postgres"
                    mkdir -p "$DATA_DIR/uploads"

                    echo "=== [2/6] Ensuring directories exist ==="
                    cd "$APP_DIR"

                    if [ -d ".git" ]; then
                        echo "Updating existing repository..."
                        git pull origin main
                    else
                        echo "Cloning repository..."
                        git clone https://github.com/mananurrehman/finvestigate.git .
                    fi

                    echo "=== [3/6] Verifying .env.production is present ==="
                    if [ ! -f "$APP_DIR/.env.production" ]; then
                        echo "Error: .env.production file is missing!"
                        echo "Please place it on the EC2 manually before deploying."
                        exit 1
                    fi
                    echo ".env.production found — OK"

                    echo "=== [4/6] Pulling latest image from DockerHub ==="
                    docker pull ${{ secrets.DOCKERHUB_USERNAME }}/finvestigate:latest

                    echo "=== [5/6] Restarting Containers ==="
                    docker compose down --remove-orphans || true
                    docker compose up -d 
                    
                    echo "=== [6/6] Health Check ==="
                    echo "Waiting 20s for containers to stabilize..."
                    sleep 20

                    echo "--- Containers Status ---"
                    docker compose ps

                    echo "--- DB health ---"
                    docker compose exec -T db pg_isready -U finvestigate_user -d finvestigate

                    echo "--- Recent Web logs ---"
                    docker compose logs web --tail 30

                    echo "Finvestigate deployed successfully!"  
                    echo "You can access the app at http://${{ secrets.EC2_HOST }}:5002"